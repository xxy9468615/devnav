name: Sync Data Sources

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Run data fetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/fetch-all.mjs
      - name: Sync embeddings (incremental)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          XFYUN_BASE_URL: ${{ secrets.XFYUN_BASE_URL }}
          XFYUN_API_KEY: ${{ secrets.XFYUN_API_KEY }}
        run: node scripts/sync-embeddings.mjs
